meta:
  version: PLCN_v3
  update_url: "https://raw.githubusercontent.com/ibfleming/fimbulwinter-lite/refs/heads/main/server/valheim-fimbulwinter-lite-egg.yaml"
exported_at: "2026-02-15T00:00:00+00:00"
name: "Fimbulwinter Lite — Valheim BepInEx"
author: ibfleming@github.com
uuid: 7175e3b0-87ce-4685-80d0-199c494c33f9
description: |-
  Fimbulwinter Lite modpack for Valheim dedicated servers. A lightweight Vanilla+
  modpack: streamlined QoL, UI polish, and multiplayer fixes that preserve vanilla
  progression and spirit. Automatically installs BepInEx, resolves all Thunderstore
  dependencies, applies modpack configs, and skips client-only mods.
  https://github.com/ibfleming/fimbulwinter-lite
image: "data:image/png;base64,"
tags: {}
features:
  - steam_disk_space
docker_images:
  "ghcr.io/parkervcp/games:valheim": "ghcr.io/parkervcp/games:valheim"
file_denylist: {}
startup_commands:
  Default: 'if [ "{{AUTO_UPDATE_MODS}}" = "1" ]; then curl -fsSL --max-time 30 "https://raw.githubusercontent.com/{{SCRIPT_REPO}}/{{SCRIPT_REF}}/scripts/server-autoupdate.sh" | bash || bash /home/container/.fimbulwinter/scripts/server-autoupdate.sh || echo "[WARN] Mod auto-update failed - continuing with existing mods"; fi; export DOORSTOP_ENABLED=1; export DOORSTOP_TARGET_ASSEMBLY=./BepInEx/core/BepInEx.Preloader.dll; export LD_LIBRARY_PATH="./doorstop_libs:./linux64:$LD_LIBRARY_PATH"; export LD_PRELOAD="libdoorstop_x64.so:$LD_PRELOAD"; export SteamAppId=892970; mkdir -p /home/container/saves; ./valheim_server.x86_64 -nographics -batchmode -name "{{SERVER_NAME}}" -port {{SERVER_PORT}} -world "{{WORLD}}" -password "{{PASSWORD}}" -public {{PUBLIC_SERVER}} -savedir /home/container/saves -saveinterval {{BACKUP_INTERVAL}} -backups {{BACKUP_COUNT}} -backupshort {{BACKUP_SHORTTIME}} -backuplong {{BACKUP_LONGTIME}} $( [ "{{ENABLE_CROSSPLAY}}" = "1" ] && echo "-crossplay" ) {{WORLD_MODIFIERS}} > >(sed -uE "{{CONSOLE_FILTER}}")'
config:
  files: {}
  startup:
    done: "Opened Steam server"
  logs: {}
  stop: ^C
scripts:
  installation:
    script: |-
      #!/bin/bash
      # ═══════════════════════════════════════════════════════════════
      # Fimbulwinter Lite — Thin Install Bootstrap
      #
      # All provisioning logic lives in the modpack repo so it can be
      # version-controlled, tested, and updated with a git push — this
      # egg never needs re-importing for logic changes. It fetches
      # scripts/server-install.sh (+ install-mods.sh) from GitHub at
      # SCRIPT_REPO@SCRIPT_REF and executes it.
      #
      # Scripts are cached in /mnt/server/.fimbulwinter/scripts so the
      # runtime auto-updater has an offline fallback.
      # ═══════════════════════════════════════════════════════════════
      set -euo pipefail

      apt -y update
      apt -y --no-install-recommends --no-install-suggests install curl ca-certificates

      SCRIPT_REPO="${SCRIPT_REPO:-ibfleming/fimbulwinter-lite}"
      SCRIPT_REF="${SCRIPT_REF:-main}"
      RAW_BASE="https://raw.githubusercontent.com/${SCRIPT_REPO}/${SCRIPT_REF}/scripts"
      SCRIPT_CACHE="/mnt/server/.fimbulwinter/scripts"

      echo "[INFO] Bootstrapping install from ${SCRIPT_REPO}@${SCRIPT_REF}"
      mkdir -p "${SCRIPT_CACHE}"
      for script in server-install.sh install-mods.sh server-autoupdate.sh; do
          curl -fsSL --retry 3 -o "${SCRIPT_CACHE}/${script}" "${RAW_BASE}/${script}" \
              || { echo "[FATAL] Could not fetch ${script} from ${RAW_BASE}" >&2; exit 1; }
      done
      chmod +x "${SCRIPT_CACHE}"/*.sh

      exec bash "${SCRIPT_CACHE}/server-install.sh"
    container: "ghcr.io/parkervcp/installers:debian"
    entrypoint: bash
variables:
  - sort: 1
    name: "Server Name"
    description: "Name that appears in the server browser."
    env_variable: SERVER_NAME
    default_value: "My Valheim Fimbulwinter Lite Server"
    user_viewable: true
    user_editable: true
    rules:
      - required
      - string
      - "max:512"
  - sort: 2
    name: "Server Password"
    description: "Server password. Must be 5-20 characters and cannot appear in the server name."
    env_variable: PASSWORD
    default_value: secret
    user_viewable: true
    user_editable: true
    rules:
      - required
      - string
      - "min:5"
      - "max:20"
  - sort: 3
    name: "World Name"
    description: "Name of the world save to load or create."
    env_variable: WORLD
    default_value: Fimbulwinter
    user_viewable: true
    user_editable: true
    rules:
      - required
      - string
      - "max:20"
  - sort: 4
    name: "Public Server"
    description: "List this server in the public server browser."
    env_variable: PUBLIC_SERVER
    default_value: 0
    user_viewable: true
    user_editable: true
    rules:
      - boolean
  - sort: 5
    name: "Auto Update"
    description: "Automatically update Valheim via SteamCMD on server start."
    env_variable: AUTO_UPDATE
    default_value: 1
    user_viewable: true
    user_editable: true
    rules:
      - boolean
  - sort: 6
    name: "Enable Crossplay"
    description: "Enable crossplay support (requires libparty.so)."
    env_variable: ENABLE_CROSSPLAY
    default_value: 0
    user_viewable: true
    user_editable: true
    rules:
      - boolean
  - sort: 7
    name: "Beta Branch"
    description: "Steam beta branch to use (leave empty for stable)."
    env_variable: SRCDS_BETAID
    default_value: ""
    user_viewable: true
    user_editable: true
    rules:
      - "max:30"
  - sort: 8
    name: "Beta Password"
    description: "Password for the beta branch (if required)."
    env_variable: SRCDS_BETAPASS
    default_value: ""
    user_viewable: true
    user_editable: true
    rules:
      - "max:30"
  - sort: 9
    name: "Backup Interval"
    description: "How often the world saves in seconds. Default: 1800 (30 minutes)."
    env_variable: BACKUP_INTERVAL
    default_value: 1800
    user_viewable: true
    user_editable: true
    rules:
      - required
      - numeric
      - "min:0"
  - sort: 10
    name: "Backup Count"
    description: |-
      Total automatic backups kept. The first uses the short interval, the rest use
      the long interval. Default: 4.
    env_variable: BACKUP_COUNT
    default_value: 4
    user_viewable: true
    user_editable: true
    rules:
      - required
      - numeric
      - "min:0"
  - sort: 11
    name: "Backup Shorttime"
    description: "Interval for the first automatic backup in seconds. Default: 7200 (2 hours)."
    env_variable: BACKUP_SHORTTIME
    default_value: 7200
    user_viewable: true
    user_editable: true
    rules:
      - required
      - numeric
      - "min:0"
  - sort: 12
    name: "Backup Longtime"
    description: "Interval between subsequent automatic backups in seconds. Default: 43200 (12 hours)."
    env_variable: BACKUP_LONGTIME
    default_value: 43200
    user_viewable: true
    user_editable: true
    rules:
      - required
      - numeric
      - "min:0"
  - sort: 13
    name: "World Modifiers"
    description: "Valheim world modifiers passed as raw args. Example: -modifier combat hard -modifier deathpenalty casual"
    env_variable: WORLD_MODIFIERS
    default_value: ""
    user_viewable: true
    user_editable: true
    rules:
      - string
  - sort: 14
    name: "[System] Console Filter"
    description: "Sed expression to filter noisy console output."
    env_variable: CONSOLE_FILTER
    default_value: '/^\(Filename:.*Line:[[:space:]]+[[:digit:]]+\)$/d; /^([[:space:]]+)?$/d'
    user_viewable: false
    user_editable: false
    rules:
      - string
  - sort: 15
    name: "[System] App ID"
    description: "Valheim dedicated server Steam App ID."
    env_variable: SRCDS_APPID
    default_value: 896660
    user_viewable: true
    user_editable: false
    rules:
      - nullable
      - numeric
  - sort: 16
    name: "[System] Server Port"
    description: "Server port. Valheim uses this port and port+1."
    env_variable: SERVER_PORT
    default_value: 2456
    user_viewable: true
    user_editable: true
    rules:
      - required
      - numeric
  - sort: 17
    name: "Auto Update Mods"
    description: "Re-sync mods and configs from the latest PUBLISHED Fimbulwinter Lite modpack on every server start. Fails soft: if the update cannot run, the server boots with existing mods."
    env_variable: AUTO_UPDATE_MODS
    default_value: 0
    user_viewable: true
    user_editable: true
    rules:
      - boolean
  - sort: 18
    name: "[System] Script Repo"
    description: "GitHub owner/repo that hosts the install scripts (scripts/*.sh)."
    env_variable: SCRIPT_REPO
    default_value: ibfleming/fimbulwinter-lite
    user_viewable: true
    user_editable: false
    rules:
      - required
      - string
      - "max:100"
  - sort: 19
    name: "[System] Script Ref"
    description: "Git ref (branch or tag) the install scripts are fetched from. Default 'main' = always latest; pin a tag like v1.0.0 for frozen installs."
    env_variable: SCRIPT_REF
    default_value: main
    user_viewable: true
    user_editable: true
    rules:
      - required
      - string
      - "max:60"
