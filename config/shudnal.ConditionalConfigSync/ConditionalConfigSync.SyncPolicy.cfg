# ConditionalConfigSync sync policy. Server-side only.
# Exact setting: + ModGuid.Section.Key or - ModGuid.Section.Key
# Whole section: + ModGuid.Section or - ModGuid.Section
# + forces server-controlled; - forces client-controlled.
# Exact-setting rules take precedence over section rules.
# Rules apply only to configs registered as Conditional.

# Fimbulwinter Lite policy: season timing and gameplay-affecting state are
# server-authoritative so all players experience the same season simultaneously.
# Purely visual/rendering settings (grass, custom textures) are explicitly carved
# out as client-controlled below so each player can toggle them locally without
# a server-enforced value overriding their choice (exact/section overrides take
# precedence over the mod-wide rule per the header above).
+ shudnal.Seasons
- shudnal.Seasons.Season - Control.Control grass
- shudnal.Seasons.Season - Control.Custom textures
- shudnal.Seasons.Season - Grass
