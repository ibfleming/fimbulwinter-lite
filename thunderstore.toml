[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "ibfleming"
name = "FimbulwinterLite"
description = "A lightweight Vanilla+ Valheim modpack: streamlined QoL, UI polish, and multiplayer fixes that preserve vanilla progression and spirit."
versionNumber = "1.0.0"
websiteUrl = "https://github.com/ibfleming/fimbulwinter-lite"

[package.dependencies]
# --- Core & Frameworks ---
denikson-BepInExPack_Valheim = "5.4.2333"
ValheimModding-Jotunn = "2.29.2"
ValheimModding-JsonDotNET = "13.0.4"
ValheimModding-YamlDotNet = "16.3.1"
shudnal-ConfigurationManager = "1.1.13"
shudnal-ConditionalConfigSync = "1.0.1"
# --- Inventory & Crafting ---
Azumatt-AzuExtendedPlayerInventory = "2.4.1"
Azumatt-AzuCraftyBoxes = "1.8.14"
Azumatt-AzuAutoStore = "3.0.14"
Azumatt-AzuContainerSizes = "1.1.4"
Azumatt-AAA_Crafting = "2.1.6"
Azumatt-Recycle_N_Reclaim = "1.4.0"
Goldenrevolver-Quick_Stack_Store_Sort_Trash_Restock = "1.4.13"
MSchmoecker-MultiUserChest = "0.6.1"
# --- UI & HUD ---
shudnal-MyLittleUI = "1.2.15"
MSchmoecker-VNEI = "0.17.5"
Neobotics-HUDCompass = "1.1.9"
Azumatt-AzuHoverStats = "1.1.9"
# --- Building ---
ComfyMods-Gizmo = "1.15.0"
Searica-Extra_Snap_Points_Made_Easy = "2.0.5"
Azumatt-AzuAreaRepair = "1.1.6"
BentoG-MissingPieces = "2.2.3"
# --- Farming ---
Advize-PlantEverything = "1.20.0"
Advize-PlantEasily = "2.1.1"
k942-MassFarming = "1.11.0"
# --- Travel & World QoL ---
OdinPlus-TeleportEverything = "2.9.1"
Nextek-SpeedyPaths = "1.0.9"
blacks7ar-WieldEquipmentWhileSwimming = "1.1.3"
# --- Fixes & Performance ---
Azumatt-AzuMiscPatches = "1.2.8"
MSchmoecker-LocalizationCache = "0.3.0"
MSchmoecker-TimeoutLimit = "0.2.0"
Searica-NetworkTweaks = "0.1.5"
Azumatt-TrueInstantLootDrop = "1.0.3"
# --- Multiplayer & Server ---
Smoothbrain-ServerCharacters = "1.4.16"
JereKuusela-Server_devcommands = "1.108.0"
JereKuusela-Upgrade_World = "1.80.0"
bdew-QuickConnect = "1.7.0"
VentureValheim-Venture_Logout_Tweaks = "0.6.0"
Smoothbrain-ShutUp = "1.0.2"
# --- Progression & Content ---
Smoothbrain-SmartSkills = "1.0.2"
Vapok-AdventureBackpacks = "1.9.13"
Smoothbrain-Groups = "1.2.10"
shudnal-Seasons = "1.8.0"

[publish]
communities = ["valheim"]

[publish.categories]
valheim = ["modpacks", "tweaks", "server-side"]

[build]

[[build.copy]]
source = "config"
target = "config"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"
